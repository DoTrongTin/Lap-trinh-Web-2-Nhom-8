<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      .logo-main {
        font-family: 'Arial', sans-serif;
        font-size: 56px;
        font-weight: bold;
        fill: url(#gradient);
        letter-spacing: -2px;
      }
      .logo-sub {
        font-family: 'Arial', sans-serif;
        font-size: 10px;
        font-weight: 600;
        fill: #2980b9;
        letter-spacing: 1px;
      }
    </style>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2980b9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e5a96;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#2980b9" stroke-width="1" opacity="0.3"/>
  
  <!-- Main text -->
  <text x="50" y="62" text-anchor="middle" class="logo-main">UK</text>
  
  <!-- Sub text -->
  <text x="50" y="85" text-anchor="middle" class="logo-sub">KEYS</text>
</svg>