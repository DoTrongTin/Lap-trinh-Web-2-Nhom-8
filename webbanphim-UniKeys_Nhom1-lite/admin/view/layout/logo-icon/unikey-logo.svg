<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <defs>
    <style>
      .logo-text {
        font-family: 'Montserrat', Arial, sans-serif;
        font-size: 48px;
        font-weight: 700;
        fill: url(#gradient);
        letter-spacing: 1px;
      }
      .logo-accent {
        font-family: 'Montserrat', Arial, sans-serif;
        font-size: 14px;
        font-weight: 300;
        fill: #2980b9;
        letter-spacing: 2px;
      }
    </style>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2980b9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e5a96;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main logo text -->
  <text x="10" y="55" class="logo-text">UniKey</text>
  
  <!-- Accent line -->
  <line x1="10" y1="62" x2="190" y2="62" stroke="#2980b9" stroke-width="2" opacity="0.6"/>
  
  <!-- Small tagline -->
  <text x="10" y="75" class="logo-accent">MECHANICAL</text>
</svg>